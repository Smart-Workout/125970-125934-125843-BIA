services:
  - type: web
    name: smart-workout-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RAG_MODE
        value: keyword
      - key: SERVE_FRONTEND
        value: false
      - key: CHAT_TIMEOUT_SECONDS
        value: 30
      - key: GENERATE_PLAN_TIMEOUT_SECONDS
        value: 45
      - key: CORS_ALLOW_ORIGINS
        sync: false

  - type: static_site
    name: smart-workout-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_V1
        value: /api/v1
